<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4F46E5" />
  
  <link rel="manifest" href="manifest.json" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="icons/anime-1024x1024.png" type="image/png" />
  <title>Anime List - Are you ready</title>

  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }
    .main-card {
      background: #1e293b;
      border: 1px solid #334155;
    }
    .anime-poster {
      aspect-ratio: 2/3;
      object-fit: cover;
    }
    /* Animasi halus saat berganti tab filter */
    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="min-h-screen">

  <header class="bg-indigo-600 p-6 text-center shadow-xl">
    <h1 class="text-3xl font-bold">Anime List</h1>
    <p class="text-indigo-200">Aplikasi tracker anime personal berbasis progressive Web App</p>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    <section class="main-card p-6 rounded-2xl mb-8">
      <h2 class="text-xl font-bold mb-2">Okaerinasai!</h2>
      <p class="text-slate-400 mb-4">
        waktunya marathon nieh! Mau nonton apa hari ini?
      </p>
    </section>

    <section class="mb-6">
      <div class="flex flex-col gap-4 mb-8">
        <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
          <input type="text" id="searchInput" onkeyup="searchAnime()" placeholder="Cari di list tontonan..." 
            class="w-full md:w-64 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 text-white">
          
          <button onclick="searchFromAPI()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg text-sm font-bold transition w-full md:w-auto shadow-lg active:scale-95">
            + Cari & Tambah Anime
          </button>
        </div>

        <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700 overflow-x-auto shadow-inner">
          <button onclick="currentFilter='Semua'; render()" id="btn-Semua" class="filter-btn flex-1 py-2 px-4 rounded-lg text-xs font-bold transition whitespace-nowrap">Semua</button>
          <button onclick="currentFilter='Direncanakan'; render()" id="btn-Direncanakan" class="filter-btn flex-1 py-2 px-4 rounded-lg text-xs font-bold transition whitespace-nowrap">Plan</button>
          <button onclick="currentFilter='Sedang Ditonton'; render()" id="btn-Sedang Ditonton" class="filter-btn flex-1 py-2 px-4 rounded-lg text-xs font-bold transition whitespace-nowrap">Watching</button>
          <button onclick="currentFilter='Selesai'; render()" id="btn-Selesai" class="filter-btn flex-1 py-2 px-4 rounded-lg text-xs font-bold transition whitespace-nowrap">Done</button>
        </div>
      </div>

      <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      </div>
    </section>
  </main>

  <footer class="text-center py-10 border-t border-slate-800 text-slate-500 text-sm">
    <p>© 2026 Marathon yuks • Anime List</p>
  </footer>

  <script>
    // --- DATA MANAGEMENT ---
    let myAnimeList = JSON.parse(localStorage.getItem('myAnimeData')) || [];
    let currentFilter = 'Semua'; // Default filter aktif

    function save() {
      localStorage.setItem('myAnimeData', JSON.stringify(myAnimeList));
      render();
    }

    // --- JIKAN API SEARCH ---
    async function searchFromAPI() {
      const query = prompt("Cari anime (contoh: Solo Leveling):");
      if (!query || query.length < 3) return;

      try {
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=1`);
        const { data } = await res.json();
        
        if (data && data.length > 0) {
          const a = data[0];
          const newAnime = {
            id: a.mal_id,
            title: a.title,
            image: a.images.jpg.large_image_url,
            status: 'Direncanakan',
            episodes: 0,
            total: a.episodes || '?'
          };
          
          if (!myAnimeList.some(item => item.id === newAnime.id)) {
            myAnimeList.push(newAnime);
            save();
          } else {
            alert("Sudah ada di daftar!");
          }
        }
      } catch (err) {
        alert("Gagal mengambil data. Coba lagi nanti.");
      }
    }

    // --- RENDERER DENGAN FILTER ---
    function render(searchText = '') {
      const grid = document.getElementById('animeGrid');
      grid.innerHTML = '';
      
      // 1. Filter Pencarian
      let filtered = myAnimeList.filter(a => a.title.toLowerCase().includes(searchText.toLowerCase()));

      // 2. Filter Berdasarkan Status (Kolom)
      if (currentFilter !== 'Semua') {
        filtered = filtered.filter(a => a.status === currentFilter);
      }

      // 3. Update Style Tombol Filter
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
        btn.classList.add('text-slate-400');
      });
      const activeBtn = document.getElementById(`btn-${currentFilter}`);
      if(activeBtn) {
        activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
        activeBtn.classList.remove('text-slate-400');
      }

      // 4. Jika data kosong
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-600 font-medium">Belum ada anime di kategori ${currentFilter}</div>`;
        return;
      }

      // 5. Gambar Grid Anime
      filtered.forEach(anime => {
        grid.innerHTML += `
          <div class="main-card rounded-xl overflow-hidden flex flex-col shadow-lg border border-slate-700 animate-fade-in">
            <img src="${anime.image}" class="anime-poster w-full" alt="Poster">
            <div class="p-3 flex-grow">
              <h3 class="text-sm font-bold line-clamp-2 mb-2 h-10">${anime.title}</h3>
              <div class="flex items-center justify-between bg-black/30 p-2 rounded text-[10px] mb-2">
                <span>Ep: ${anime.episodes}/${anime.total}</span>
                <div class="flex gap-1">
                  <button onclick="updateEp(${anime.id}, 1)" class="bg-indigo-600 px-2 rounded hover:bg-indigo-500 transition">+</button>
                  <button onclick="updateEp(${anime.id}, -1)" class="bg-slate-700 px-2 rounded hover:bg-slate-600 transition">-</button>
                </div>
              </div>
              <select onchange="updateStatus(${anime.id}, this.value)" class="w-full bg-slate-900 text-[10px] p-1 rounded border-none outline-none cursor-pointer hover:bg-slate-800 transition">
                <option value="Direncanakan" ${anime.status==='Direncanakan'?'selected':''}>Plan</option>
                <option value="Sedang Ditonton" ${anime.status==='Sedang Ditonton'?'selected':''}>Watching</option>
                <option value="Selesai" ${anime.status==='Selesai'?'selected':''}>Done</option>
              </select>
            </div>
            <button onclick="removeAnime(${anime.id})" class="text-[10px] text-red-400 py-2 hover:bg-red-500/10 transition border-t border-slate-800">Hapus</button>
          </div>
        `;
      });
    }

    // --- FUNGSI UPDATE ---
    function updateEp(id, change) {
      const a = myAnimeList.find(i => i.id === id);
      if(a) { 
        a.episodes = Math.max(0, a.episodes + change); 
        // Jika episode melebihi total (untuk antisipasi)
        if(typeof a.total === 'number' && a.episodes > a.total) a.episodes = a.total;
        save(); 
      }
    }
    
    function updateStatus(id, val) {
      const a = myAnimeList.find(i => i.id === id);
      if(a) { 
        a.status = val; 
        save(); 
      }
    }

    function removeAnime(id) {
      if(confirm('Hapus anime ini dari daftar?')) { 
        myAnimeList = myAnimeList.filter(i => i.id !== id); 
        save(); 
      }
    }

    function searchAnime() {
      render(document.getElementById('searchInput').value);
    }

    // --- SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('SW registered!'))
        .catch(err => console.error('SW gagal:', err));
    }

    // Load Data awal
    render();
  </script>

</body>
</html>
