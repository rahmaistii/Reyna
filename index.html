<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Watchlist - Quest Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --ongoing: #ff4d4d;
            --completed: #ffcc00;
            --plan: #00ff88;
            --glass: rgba(15, 15, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Dynamic Background - Anime Landscape HD */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.alphacoders.com/132/1327170.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        /* Container Glassmorphism */
        .app-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Counter Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-card span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-card strong {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Input Group */
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(108, 92, 231, 0.5);
            filter: brightness(1.1);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.6);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .tab.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* Anime List */
        .anime-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .anime-list::-webkit-scrollbar {
            width: 4px;
        }

        .anime-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Status Dot Cycle */
        .status-cycle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .status-cycle::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .status-cycle:hover::after {
            border-color: rgba(255,255,255,0.3);
        }

        .ongoing { background: var(--ongoing); box-shadow: 0 0 10px var(--ongoing); }
        .completed { background: var(--completed); box-shadow: 0 0 10px var(--completed); }
        .plan { background: var(--plan); box-shadow: 0 0 10px var(--plan); }

        .anime-title {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: var(--ongoing);
            transform: rotate(90deg) scale(1.2);
        }

        /* Utility */
        .empty-state {
            text-align: center;
            opacity: 0.4;
            padding: 40px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>ANIME QUEST LOG</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Total</span>
                <strong id="count-all">0</strong>
            </div>
            <div class="stat-card">
                <span>Watching</span>
                <strong id="count-ongoing" style="color: var(--ongoing);">0</strong>
            </div>
            <div class="stat-card">
                <span>Finished</span>
                <strong id="count-completed" style="color: var(--completed);">0</strong>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="animeInput" placeholder="Ketik anime yang mau kamu tonton..." onkeypress="handleEnter(event)">
            <button class="btn-add" onclick="addAnime()">Add Quest</button>
        </div>

        <div class="filter-tabs">
            <button class="tab active" onclick="setFilter('all')">Semua</button>
            <button class="tab" onclick="setFilter('ongoing')">Ongoing</button>
            <button class="tab" onclick="setFilter('completed')">Tamat</button>
            <button class="tab" onclick="setFilter('plan')">Rencana</button>
        </div>

        <ul id="animeList" class="anime-list">
            </ul>
    </div>

    <script>
        // Data & State
        let animes = JSON.parse(localStorage.getItem('anime_data')) || [];
        let filter = 'all';

        // Initialize
        render();

        function addAnime() {
            const input = document.getElementById('animeInput');
            const val = input.value.trim();
            
            if (val === "") return;

            const newAnime = {
                id: Date.now(),
                title: val,
                status: 'plan' // Default: Plan to Watch (Green)
            };

            animes.unshift(newAnime);
            input.value = "";
            save();
            render();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') addAnime();
        }

        function toggleStatus(id) {
            animes = animes.map(item => {
                if (item.id === id) {
                    // Cycle: Plan -> Ongoing -> Completed -> Plan
                    const states = ['plan', 'ongoing', 'completed'];
                    let nextIndex = (states.indexOf(item.status) + 1) % states.length;
                    item.status = states[nextIndex];
                }
                return item;
            });
            save();
            render();
        }

        function deleteAnime(id) {
            animes = animes.filter(item => item.id !== id);
            save();
            render();
        }

        function setFilter(newFilter) {
            filter = newFilter;
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(newFilter) || (newFilter === 'all' && btn.innerText === 'Semua'));
            });
            render();
        }

        function save() {
            localStorage.setItem('anime_data', JSON.stringify(animes));
        }

        function render() {
            const listContainer = document.getElementById('animeList');
            listContainer.innerHTML = "";

            const filteredAnimes = animes.filter(item => {
                if (filter === 'all') return true;
                return item.status === filter;
            });

            if (filteredAnimes.length === 0) {
                listContainer.innerHTML = `<li class="empty-state">Belum ada quest di kategori ini...</li>`;
            }

            filteredAnimes.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <div class="item-left">
                        <div class="status-cycle ${item.status}" 
                             onclick="toggleStatus(${item.id})" 
                             title="Klik untuk ganti status">
                        </div>
                        <span class="anime-title">${item.title}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteAnime(${item.id})" title="Hapus Quest">
                        🥷
                    </button>
                `;
                listContainer.appendChild(li);
            });

            updateStats();
        }

        function updateStats() {
            document.getElementById('count-all').innerText = animes.length;
            document.getElementById('count-ongoing').innerText = animes.filter(a => a.status === 'ongoing').length;
            document.getElementById('count-completed').innerText = animes.filter(a => a.status === 'completed').length;
        }
    </script>
</body>
</html>
